<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact for reservations, questions, and rafting information.">
    <meta name="author" content="DRICHE ROCHARDIN Aloula">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us | Crossed Oars Adventure</title>
</head>

<body>
    <header>
        <nav>
            <img src="images/z-crossedoars.jpeg" alt="Company Logo">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1 class="contact-title">Contact Us</h1>

        <section class="contact-info">
            <h2>Company Information</h2>

            <p><strong>Address:</strong> 15, bis, AVENUE GOSCONE ,BRAZZAVILLE CG, ID</p>
            <p><strong>Phone:</strong> +242 06 956 71 64</p>
            <p><strong>Email:</strong> arochardin01.com</p>
        </section>

        <section class="map">
            <h2>Find Us</h2>

            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1989.3459204832188!2d15.23894743344745!3d-4.279972046223044!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1a6a33ef1576311d%3A0x60bdd8cdb467f403!2sFondation%20MATETE!5e0!3m2!1sfr!2scg!4v1781151575418!5m2!1sfr!2scg"
              width="600" height="450" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            </iframe>
        </section>

        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/rafting_two.jpg" alt="General Manager">
                <figcaption>John Smith - General Manager</figcaption>
            </figure>

            <figure>
                <img src="images/rafting_three.jpg" alt="River Guide">
                <figcaption>Sarah Johnson - River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/rafting_one.jpg" alt="Safety Instructor">
                <figcaption>David Wilson - Safety Instructor</figcaption>
            </figure>
        </section>

        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <p>Purpose of Message</p>

                <div class="radio-group">
                    <input type="radio" id="general" name="purpose" value="general">
                    <label for="general">General Inquiry</label>
                </div>

                <div class="radio-group">
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    <label for="reservation">Reservation Question</label>
                </div>

                <div class="radio-group">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    <label for="suggestion">Website Suggestion</label>
                </div>

                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>

                <div class="checkbox">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>
                </div>

                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>

    <footer>
        <p>©2026 | DR-Events | DRICHE ROCHARDIN ALOULA</p>

        <nav class="socialmedia">
            <a href="https://www.facebook.com/">
                <img src="images/facebook.jpg" alt="Facebook" class="icon-media">
            </a>

            <a href="https://www.linkedin.com/">
                <img src="images/lindkln.jpg" alt="LinkedIn" class="icon-media">
            </a>

            <a href="https://www.instagram.com/">
                <img src="images/instagram.jpg" alt="Instagram" class="icon-media">
            </a>
        </nav>
    </footer>

</body>

</html>
